<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Интерактивный Слайдер</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

<div class="slider-container">
    <div class="image-viewport">
        <img src="images/cat1.jpeg" class="slide active" alt="Изображение 1">
        <img src="images/cat2.jpeg" class="slide" alt="Изображение 2">
        <img src="images/cat3.jpeg" class="slide" alt="Изображение 3">
        <img src="images/cat4.jpeg" class="slide" alt="Изображение 4">
        <img src="images/cat5.jpeg" class="slide" alt="Изображение 5">
    </div>

    <div class="controls">
        <button class="btn" id="prevBtn">Назад</button>
        <div class="counter" id="counter">Изображение 1 из 5</div>
        <button class="btn" id="nextBtn">Вперед</button>
    </div>
</div>

<script src="js/script.js"></script>
</body>
</html>
